<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gmail Surge — Payment Successful</title>
  <meta name="description" content="Your Gmail Surge Pro upgrade was successful. Copy your license key to activate unlimited bulk email sending.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://gmailsurge.com/stripe-success.html">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F9FAFB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 480px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1F2937; margin-bottom: 8px; }
    p { color: #6B7280; line-height: 1.6; margin-bottom: 16px; }
    .code-box {
      background: #F3F4F6;
      border: 2px dashed #D1D5DB;
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      color: #1F2937;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .code-box:hover { border-color: #4F46E5; }
    .copy-btn {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #4338CA; }
    .hint { font-size: 13px; color: #9CA3AF; margin-top: 16px; }
    .error { color: #EF4444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for upgrading to Gmail Surge Pro. Copy the activation code below and paste it into the extension settings.</p>

    <div class="code-box" id="codeBox" title="Click to copy">
      <span id="codeDisplay">Loading...</span>
    </div>

    <button class="copy-btn" id="copyBtn">Copy Activation Code</button>

    <p class="hint">
      Open the Gmail Surge extension → Settings → paste this code in the activation field.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const codeDisplay = document.getElementById('codeDisplay');
    const copyBtn = document.getElementById('copyBtn');

    if (sessionId) {
      codeDisplay.textContent = sessionId;
    } else {
      codeDisplay.innerHTML = '<span class="error">No session ID found. Please contact support.</span>';
      copyBtn.disabled = true;
    }

    copyBtn.addEventListener('click', async () => {
      if (!sessionId) return;
      try {
        await navigator.clipboard.writeText(sessionId);
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy Activation Code'; }, 2000);
      } catch {
        const textarea = document.createElement('textarea');
        textarea.value = sessionId;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy Activation Code'; }, 2000);
      }
    });

    document.getElementById('codeBox').addEventListener('click', () => {
      copyBtn.click();
    });
  </script>
</body>
</html>
